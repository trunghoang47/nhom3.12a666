        .gallery img {
            width: 350px;

            transition: transform 0.3s;
        }

            transform: scale(1.1);

        footer {
            background: #111;

        .btn {
            background: #ff4081;

            padding: 10px 20px;

            border-radius: 20px;
            cursor: pointer;
        }

        .btn:hover {
            background: #e91e63;
        }

        /* 🌿 HIỆU ỨNG LÁ RƠI */
        .leaf {
            position: fixed;
            top: -50px;
            font-size: 24px;
            animation: fall linear infinite;
            pointer-events: none;
            z-index: 999;
        }

        @keyframes fall {
            0% {
                transform: translateY(-50px) translateX(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) translateX(100px) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
    <script>
function hienThongBao() {

// 🌿 TẠO LÁ RƠI
function taoLa() {
    const leaf = document.createElement("div");
    leaf.classList.add("leaf");
    leaf.innerHTML = "🍂"; // lá khô

    leaf.style.left = Math.random() * 100 + "vw";
    leaf.style.animationDuration = (4 + Math.random() * 4) + "s";
    leaf.style.fontSize = (18 + Math.random() * 20) + "px";

    document.body.appendChild(leaf);

    setTimeout(() => {
        leaf.remove();
    }, 8000);
}

setInterval(taoLa, 300);
</script>
